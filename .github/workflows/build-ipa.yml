閿樼俯ame: Build IPA (unsigned, sign with iLoader)

on:
  workflow_dispatch:  # 閹靛濮╃憴锕€褰?
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_TERMINAL_PROMPT: "0"
  CI: "true"

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Remove git remote to prevent 403 errors
        run: |
          git remote remove origin || true

      - name: Install CocoaPods
        run: |
          brew list cocoapods 2>/dev/null || brew install cocoapods
          pod --version

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (generate ios native project)
        run: npx expo prebuild --platform ios --clean

      - name: Install Pods
        run: npx pod-install

      - name: Build unsigned .app with Xcode
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -type d -name "*.xcworkspace" 2>/dev/null | head -1 | sed "s|^\./||")
          echo "Found workspace: $WORKSPACE"
          SCHEME=$(find . -maxdepth 1 -type d -name "*.xcodeproj" 2>/dev/null | head -1 | sed "s|^\./||;s/\.xcodeproj//")
          echo "Using scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          APP_DIR=$(find ios/build/Build/Products/Release-iphoneos -name "*.app" -type d 2>/dev/null | head -1)
          echo "App bundle: $APP_DIR"
          if [ -z "$APP_DIR" ]; then
            # Fallback: search broader
            APP_DIR=$(find ios/build -name "*.app" -type d 2>/dev/null | head -1)
            echo "Fallback app bundle: $APP_DIR"
          fi
          cp -R "$APP_DIR" Payload/
          zip -r loan-helper-unsigned.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: loan-helper-ipa
          path: ./*.ipa

